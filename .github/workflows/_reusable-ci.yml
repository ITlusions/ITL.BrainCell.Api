name: CI (reusable)

# ---------------------------------------------------------------------------
# Reusable workflow: lint → test → docker build (no push)
# Gebruikt door on-push.yml (branches) en on-tag.yml (tags)
# ---------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      image-name:
        description: "GHCR image naam zonder tag, bijv. ghcr.io/itlusions/braincell-api"
        required: true
        type: string
      python-version:
        description: "Python versie"
        required: false
        type: string
        default: "3.12"
      ref:
        description: "Git ref om uit te checken (branch of tag)"
        required: false
        type: string
        default: ""
    secrets:
      GH_PAT:
        description: "PAT voor het ophalen van ITL.BrainCell (cross-repo)"
        required: false
    outputs:
      docker-digest:
        description: "Image digest van de gebouwde (niet-gepushte) Docker image"
        value: ${{ jobs.ci.outputs.docker-digest }}

jobs:
  ci:
    name: Lint / Test / Docker Build
    runs-on: ubuntu-latest
    outputs:
      docker-digest: ${{ steps.build.outputs.digest }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout huidige repo naar submap ITL.BrainCell.Api/
      #    (Docker build context verwacht beide repos naast elkaar)
      # ------------------------------------------------------------------
      - name: Checkout ITL.BrainCell.Api
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: ITL.BrainCell.Api

      # ------------------------------------------------------------------
      # 2. Checkout ITL.BrainCell (core library) naar ITL.BrainCell/
      # ------------------------------------------------------------------
      - name: Checkout ITL.BrainCell (core)
        uses: actions/checkout@v4
        with:
          repository: ITlusions/ITL.BrainCell
          token: ${{ secrets.GH_PAT }}
          path: ITL.BrainCell

      # ------------------------------------------------------------------
      # 3. Python-omgeving opzetten
      # ------------------------------------------------------------------
      - name: Setup Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ITL.BrainCell/requirements.txt
            ITL.BrainCell.Api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio pytest-cov
          pip install -e ./ITL.BrainCell
          pip install -e ./ITL.BrainCell.Api

      # ------------------------------------------------------------------
      # 4. Lint (ruff)
      # ------------------------------------------------------------------
      - name: Lint (ruff)
        working-directory: ITL.BrainCell.Api
        run: ruff check src/

      # ------------------------------------------------------------------
      # 5. Tests
      # ------------------------------------------------------------------
      - name: Run tests
        working-directory: ITL.BrainCell.Api
        run: |
          if [ -d "tests" ]; then
            pytest tests/ \
              --tb=short \
              --cov=src \
              --cov-report=term-missing \
              --cov-report=xml:coverage.xml
          else
            echo "Geen tests/ map gevonden — stap overgeslagen"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ITL.BrainCell.Api/coverage.xml
          if-no-files-found: ignore

      # ------------------------------------------------------------------
      # 6. Docker build (validate only, geen push)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ITL.BrainCell.Api/Dockerfile
          push: false
          tags: ${{ inputs.image-name }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
