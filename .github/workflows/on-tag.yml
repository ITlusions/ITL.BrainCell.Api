name: Release — Create GitHub Release (manual)

# ---------------------------------------------------------------------------
# Manual fallback: create a GitHub Release for a specific tag.
# Normal flow: release is created automatically via on-push.yml.
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.2)"
        required: true
        type: string

jobs:
  release:
    name: GitHub Release
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
    with:
      tag: ${{ inputs.tag }}
      generate-release-notes: true

