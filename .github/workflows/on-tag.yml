name: Release — Create GitHub Release

# ---------------------------------------------------------------------------
# Triggered by semver tag push (created by auto-tag on main).
# Only creates the GitHub Release — Docker build is handled by on-release.yml
# which triggers automatically when the release is published.
# ---------------------------------------------------------------------------
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  release:
    name: GitHub Release
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
    with:
      tag: ${{ github.ref_name }}
      generate-release-notes: true

