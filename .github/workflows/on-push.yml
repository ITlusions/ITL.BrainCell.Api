name: CI — Branch push

# ---------------------------------------------------------------------------
# Triggers on GitFlow branches (feature, develop, release, hotfix, main).
# On main: after a successful CI run, a patch version tag is auto-created.
# That tag triggers on-tag.yml → GitHub Release (published)
# which in turn triggers on-release.yml → Docker build + push to GHCR.
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-ci-docker.yml@main
    with:
      image-name: "ghcr.io/itlusions/braincell-api"
      ref: ${{ github.sha }}

  auto-tag:
    name: Auto-tag patch release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-auto-tag.yml@main
    with:
      commit-sha: ${{ github.sha }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}

