name: CI — Branch push

# ---------------------------------------------------------------------------
# Triggers on GitFlow branches (feature, develop, release, hotfix, main).
#
# Every branch:
#   detect-version → ci (lint + test + docker validate, tagged with version)
#
# Only on main push:
#   → auto-tag → docker build + push → GitHub Release
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-version:
    name: Detect version
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-detect-version.yml@main

  ci:
    name: CI
    needs: detect-version
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-ci-docker.yml@main
    with:
      image-name: "ghcr.io/itlusions/braincell-api"
      ref: ${{ github.sha }}
      version: ${{ needs.detect-version.outputs.image-tag }}
      push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      registry-username: ${{ github.actor }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}

  auto-tag:
    name: Auto-tag patch release
    needs: [ci, detect-version]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-auto-tag.yml@main
    with:
      commit-sha: ${{ github.sha }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}

  docker:
    name: Retag Docker image to release tag
    needs: [ci, auto-tag]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-docker-retag.yml@main
    with:
      source-image: ${{ needs.ci.outputs.image-tag }}
      target-image: "ghcr.io/itlusions/braincell-api"
      target-tag: ${{ needs.auto-tag.outputs.tag }}
    secrets:
      registry-password: ${{ secrets.GH_PAT }}

  release:
    name: GitHub Release
    needs: [docker, auto-tag]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
    with:
      tag: ${{ needs.auto-tag.outputs.tag }}
      generate-release-notes: true

