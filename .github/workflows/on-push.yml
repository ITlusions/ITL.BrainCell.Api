name: CI — Branch push

# ---------------------------------------------------------------------------
# Triggers on GitFlow branches (feature, develop, release, hotfix, main).
# On main: CI → auto-tag → docker build + push → GitHub Release
# All steps run in this single workflow — no cross-workflow event chain needed.
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-ci-docker.yml@main
    with:
      image-name: "ghcr.io/itlusions/braincell-api"
      ref: ${{ github.sha }}

  auto-tag:
    name: Auto-tag patch release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-auto-tag.yml@main
    with:
      commit-sha: ${{ github.sha }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}

  docker:
    name: Build and push Docker image
    needs: [ci, auto-tag]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-docker-build.yml@main
    with:
      image-name: "ghcr.io/itlusions/braincell-api"
      tag: ${{ needs.auto-tag.outputs.tag }}
      ref: ${{ needs.auto-tag.outputs.tag }}
    secrets:
      registry-password: ${{ secrets.GH_PAT }}

  release:
    name: GitHub Release
    needs: [docker, auto-tag]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
    with:
      tag: ${{ needs.auto-tag.outputs.tag }}
      generate-release-notes: true

